name: windows installer (F5 packaging)

# Builds the actual Windows installer (.msi via WiX + .exe via NSIS) for
# Centinelo Phone, using shell/src-tauri/tauri.official.conf.json's
# `bundle.resources` override (filtered per-run by scripts/package-
# official.sh's step 9a into tauri.official.generated.json - see that
# script's header comment, "Windows target", plus step 9a's own comment,
# for why a per-run FILTER exists: a static, unconditional resources
# declaration made `tauri build` hard-fail for any combination that doesn't
# populate every declared resource, e.g. a Community edition build with no
# premium dylib) to pull in the core engine binary, the signed premium
# dylib+.sig, and the premium console-ui assets that package-official.sh
# stages into shell/dist-injected/ (see that script's header comment,
# "Windows target", for why this two-step stage-then-bundle shape exists -
# NSIS/MSI package a manifest, not whatever's sitting in target/release/
# afterward, unlike macOS's .app).
#
# workflow_dispatch here only drives resources-mechanism-smoke-test now (see
# that job below) - the official-pro-build job this file used to also gate
# behind workflow_dispatch has been RETIRED (2026-07-16, release-ci pass) and
# replaced with an inert stub; see that job's own header comment for why and
# where the real thing moved. The `build_official_pro` /
# `i_understand_public_artifact_risk` inputs below are now unused by any live
# job - kept only so the stub's failure message (dispatched with
# build_official_pro=true) can explain the move rather than the input simply
# vanishing out from under anyone with it saved in a previous dispatch form.
#
# `push`/`pull_request` triggers below (2026-07-16, release-ci pass):
# retargeted off `feature/windows-installer` (this workflow's original
# feature branch, now merged - phone PR #2, v2 -> main) onto `main` (where
# merges land after 4R review) plus `v2` while that integration branch
# still exists - the same pair core-build.yml/shell-build.yml now use.
# `pull_request` is new here: this job never ran on a PR before, so a PR
# that touched packaging (tauri.conf.json / tauri.official.conf.json /
# package-official.sh / this file) could merge to main with the resources
# mechanism unproven - the matrix smoke test below is cheap (synthetic
# fixtures, no core/premium build) and now runs as a PR check the same way
# core-build.yml/shell-build.yml already do. Path filters stay unchanged:
# this job only cares about packaging-shaped changes, not every push to
# main.
on:
  push:
    branches: [main, v2]
    paths:
      - 'shell/src-tauri/tauri.conf.json'
      - 'shell/src-tauri/tauri.official.conf.json'
      - 'scripts/package-official.sh'
      - '.github/workflows/windows-installer.yml'
  pull_request:
    branches: [main, v2]
    paths:
      - 'shell/src-tauri/tauri.conf.json'
      - 'shell/src-tauri/tauri.official.conf.json'
      - 'scripts/package-official.sh'
      - '.github/workflows/windows-installer.yml'
  workflow_dispatch:
    inputs:
      build_official_pro:
        description: >-
          Also run the official Pro build job (needs core-win merged +
          PREMIUM_REPO_PAT secret + a real signed dylib - see that job's
          comments. Leave false to only run the resources-mechanism smoke
          test, which needs none of that.)
        type: boolean
        default: false
      i_understand_public_artifact_risk:
        description: >-
          SECOND, independent confirmation required to actually run
          official-pro-build (build_official_pro alone is not enough - see
          that job's guard step and header comment). Uploading the
          OFFICIAL installer (signed premium dylib + premium console-ui
          source) as a GitHub Actions artifact on THIS PUBLIC repo makes it
          downloadable by any GitHub user for the artifact's retention
          window - Actions artifacts have no per-repo-visibility ACL beyond
          "public repo -> public artifact." There is no approved
          publication path for the real official installer yet. Leave
          false until Felix has decided where it actually gets published
          (private storage, or this job moved to the private repo's own
          Actions).
        type: boolean
        default: false

# 4R/RISK minor fix 2026-07-16: default token scope is read-only for
# everything this workflow does (checkout public + private-via-PAT repos,
# build, upload-artifact - none of those need `contents: write` or any
# other elevated scope). Narrowing here means a future step added to
# either job that DOES need to write something has to opt in explicitly,
# rather than silently inheriting a broader default.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------
  # Always runs on dispatch. Proves the NSIS/MSI + `bundle.resources`
  # mechanism itself works — that a real installer is produced and that
  # it actually contains files staged into shell/dist-injected/ at the
  # expected install-time locations — using synthetic, clearly-fake
  # fixtures. Needs NEITHER core-win NOR the private premium repo NOR any
  # secret: it is a test of this repo's own Tauri config + packaging
  # script, nothing else.
  #
  # 4R/RELIABILITY fix 2026-07-16 (BLOCKER #1): this job now runs as a
  # matrix over the THREE combinations package-official.sh --help
  # documents as supported - Community (no premium at all),
  # Pro-without-console (premium dylib, no console-ui assets), and
  # Pro-with-console (all three) - and drives each one through
  # scripts/package-official.sh itself (not a hand-rolled `tauri build`
  # call), so the SAME code path a real official build uses is what gets
  # proven here. Previously this job only ever staged all fixtures
  # unconditionally and called `tauri build` directly against the static
  # template, which never exercised the Community or
  # Pro-without-console cases at all - both of which hard-failed against
  # that static template's unconditional resource declarations (the actual
  # blocker this matrix closes).
  # ---------------------------------------------------------------------
  resources-mechanism-smoke-test:
    name: NSIS/MSI resources mechanism (${{ matrix.combo }}, synthetic fixtures)
    runs-on: windows-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        combo: [community, pro-no-console, pro-full]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Rust toolchain
        run: rustup show

      - name: Stage synthetic core build + OpenSSL DLLs + (combo-dependent) premium fixtures
        # Clearly-fake content, same shape package-official.sh's own steps
        # 6-8 produce for real - marker strings below are grepped for after
        # bundling, as proof the files really rode into the installer
        # rather than this job just trusting a green exit code. The core
        # build fixture lands where --skip-core-build expects it
        # (core/deps/baresip/build/Release/baresip.exe on Windows - see
        # package-official.sh's CORE_BIN_SUBDIR), so this job exercises
        # package-official.sh's OWN staging + config-generation logic
        # end-to-end, not a reimplementation of it.
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "core\deps\baresip\build\Release" | Out-Null
          "FAKE-FIXTURE-CENTINELO-BARESIP-MARKER" | Out-File -Encoding ascii "core\deps\baresip\build\Release\baresip.exe"

          # OpenSSL runtime DLL fixtures (blocker #1 fix, 2026-07-16, and
          # blocker #2's stricter basename check, 2026-07-16): names match
          # what a real Chocolatey openssl v4.x install (current, OpenSSL
          # 3.x) produces and what package-official.sh's own validation now
          # requires by name (libssl-*.dll / libcrypto-*.dll), not just
          # "some .dll".
          New-Item -ItemType Directory -Force -Path "fake-openssl-dlls" | Out-Null
          "FAKE-FIXTURE-CENTINELO-LIBSSL-MARKER" | Out-File -Encoding ascii "fake-openssl-dlls\libssl-3-x64.dll"
          "FAKE-FIXTURE-CENTINELO-LIBCRYPTO-MARKER" | Out-File -Encoding ascii "fake-openssl-dlls\libcrypto-3-x64.dll"

          $combo = "${{ matrix.combo }}"
          if ($combo -ne "community") {
            New-Item -ItemType Directory -Force -Path "fake-premium" | Out-Null
            "FAKE-FIXTURE-CENTINELO-DYLIB-MARKER" | Out-File -Encoding ascii "fake-premium\centinelo_premium.dll"
            "FAKE-FIXTURE-CENTINELO-SIG-MARKER" | Out-File -Encoding ascii "fake-premium\centinelo_premium.dll.sig"
          }
          if ($combo -eq "pro-full") {
            New-Item -ItemType Directory -Force -Path "fake-console-ui\bridge" | Out-Null
            New-Item -ItemType Directory -Force -Path "fake-console-ui\components" | Out-Null
            New-Item -ItemType Directory -Force -Path "fake-console-ui\store" | Out-Null
            "FAKE-FIXTURE-CENTINELO-CONSOLEAPP-MARKER" | Out-File -Encoding ascii "fake-console-ui\console-app.js"
            "FAKE-FIXTURE-CENTINELO-BRIDGE-MARKER" | Out-File -Encoding ascii "fake-console-ui\bridge\EngineBridge.js"
            "FAKE-FIXTURE-CENTINELO-COMPONENT-MARKER" | Out-File -Encoding ascii "fake-console-ui\components\extension-grid.js"
            "FAKE-FIXTURE-CENTINELO-STORE-MARKER" | Out-File -Encoding ascii "fake-console-ui\store\ConsoleStore.js"
          }

      - name: Run scripts/package-official.sh --target windows (${{ matrix.combo }})
        shell: bash
        run: |
          set -euo pipefail
          ARGS=(--target windows --skip-core-build --openssl-dll-dir "$PWD/fake-openssl-dlls" --output-dir "dist/windows-${{ matrix.combo }}")
          if [[ "${{ matrix.combo }}" != "community" ]]; then
            ARGS+=(--premium-dylib "$PWD/fake-premium/centinelo_premium.dll" --premium-sig "$PWD/fake-premium/centinelo_premium.dll.sig")
          fi
          if [[ "${{ matrix.combo }}" == "pro-full" ]]; then
            ARGS+=(--premium-console-assets "$PWD/fake-console-ui")
          fi
          bash scripts/package-official.sh "${ARGS[@]}"

      - name: List produced installer artifacts
        shell: pwsh
        run: |
          Get-ChildItem -Recurse "shell\src-tauri\target\release\bundle\nsis"
          Get-ChildItem -Recurse "shell\src-tauri\target\release\bundle\msi"

      - name: Extract MSI (admin install, no actual install) and verify staged files are present
        shell: pwsh
        run: |
          $combo = "${{ matrix.combo }}"
          $msi = Get-ChildItem "shell\src-tauri\target\release\bundle\msi\*.msi" | Select-Object -First 1
          if (-not $msi) { Write-Error "no .msi produced"; exit 1 }
          $extractDir = "$PWD\msi-extracted"

          # 4R/RESILIENCE fix 2026-07-16 (blocker #7): `msiexec /a` launches
          # its admin-install and returns to the shell BEFORE the install
          # actually finishes writing files - the previous `Start-Sleep -Seconds
          # 5` was a guess at how long that takes, not a real synchronization
          # primitive (fails silently-flaky if the extract is ever slower than
          # 5s, e.g. a loaded runner). Start-Process -Wait blocks on the real
          # process exit instead.
          $p = Start-Process -FilePath "msiexec.exe" -ArgumentList @('/a', "`"$($msi.FullName)`"", '/qn', "TARGETDIR=`"$extractDir`"") -PassThru -Wait
          if ($p.ExitCode -ne 0) { Write-Error "msiexec /a exited with code $($p.ExitCode)"; exit 1 }

          Write-Host "== MSI extracted tree =="
          Get-ChildItem -Recurse "$extractDir"

          # Select-String has no -Recurse parameter of its own (that's a
          # Get-ChildItem thing) - piping a recursive file listing into it
          # is the correct shape.
          $hits = Get-ChildItem -Path $extractDir -Recurse -File -ErrorAction SilentlyContinue | Select-String -Pattern "FAKE-FIXTURE-CENTINELO" -ErrorAction SilentlyContinue
          if (-not $hits) {
            Write-Error "none of the FAKE-FIXTURE-CENTINELO marker strings were found anywhere in the extracted MSI - bundle.resources did not make it into the installer"
            exit 1
          }
          Write-Host "== Marker strings found in MSI (proof resources rode along) =="
          $hits | ForEach-Object { Write-Host $_.Path }

          # core-engine/ + OpenSSL DLLs: required in EVERY combo.
          $baresipExe = Get-ChildItem -Recurse "$extractDir" -Filter "baresip.exe" | Select-Object -First 1
          if (-not $baresipExe) { Write-Error "baresip.exe (core-engine fixture) not found in extracted MSI"; exit 1 }
          # 4R/RESILIENCE fix 2026-07-16 (blocker #2): explicit basename
          # checks (libssl-*.dll / libcrypto-*.dll), not "any *.dll" - a
          # directory with the wrong DLLs must fail this check, both here
          # and in package-official.sh's own validation.
          $libssl = Get-ChildItem -Recurse "$extractDir" -Filter "libssl-*.dll" | Select-Object -First 1
          $libcrypto = Get-ChildItem -Recurse "$extractDir" -Filter "libcrypto-*.dll" | Select-Object -First 1
          if (-not $libssl) { Write-Error "no libssl-*.dll found in extracted MSI - core.exe would fail to start on a clean machine"; exit 1 }
          if (-not $libcrypto) { Write-Error "no libcrypto-*.dll found in extracted MSI - core.exe would fail to start on a clean machine"; exit 1 }
          if ($baresipExe.DirectoryName -ne $libssl.DirectoryName -or $baresipExe.DirectoryName -ne $libcrypto.DirectoryName) {
            Write-Error "OpenSSL DLLs are NOT beside baresip.exe: baresip.exe in $($baresipExe.DirectoryName), libssl in $($libssl.DirectoryName), libcrypto in $($libcrypto.DirectoryName)"
            exit 1
          }
          Write-Host "OK: baresip.exe + libssl-*.dll + libcrypto-*.dll all beside each other at $($baresipExe.DirectoryName)"

          $exe = Get-ChildItem -Recurse "$extractDir" -Filter "centinelo-shell.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "centinelo-shell.exe not found in extracted MSI"; exit 1 }

          $dll = Get-ChildItem -Recurse "$extractDir" -Filter "centinelo_premium.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($combo -eq "community") {
            # BLOCKER #1 fix, verified from the other direction: a Community
            # build must NOT ship the premium dylib at all - proves the
            # dynamic resources filter actually excludes it, not just that
            # it happens to be absent.
            if ($dll) { Write-Error "Community combo shipped centinelo_premium.dll - the resources filter leaked a premium artifact into a Community build"; exit 1 }
            Write-Host "OK: Community combo correctly ships no centinelo_premium.dll"
          } else {
            if (-not $dll) { Write-Error "centinelo_premium.dll not found in extracted MSI for combo '$combo'"; exit 1 }
            if ($exe.DirectoryName -ne $dll.DirectoryName) {
              Write-Error "centinelo_premium.dll is NOT beside centinelo-shell.exe: exe in $($exe.DirectoryName), dll in $($dll.DirectoryName)"
              exit 1
            }
            Write-Host "OK: centinelo_premium.dll is beside centinelo-shell.exe at $($exe.DirectoryName)"
          }

          $consoleMarker = Get-ChildItem -Recurse "$extractDir" -Filter "console-app.js" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($combo -eq "pro-full") {
            if (-not $consoleMarker) { Write-Error "console-app.js (premium-console-assets fixture) not found in extracted MSI for pro-full combo"; exit 1 }
            $bridge = Get-ChildItem -Recurse "$extractDir" -Filter "EngineBridge.js" -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $bridge) { Write-Error "premium-console-assets/bridge/EngineBridge.js not found in extracted MSI - subfolder resource entries did not ride along"; exit 1 }
            Write-Host "OK: premium-console-assets (base + bridge subfolder) found in pro-full combo"
          } else {
            if ($consoleMarker) { Write-Error "combo '$combo' shipped premium-console-assets/console-app.js - it should not have any console assets" ; exit 1 }
            Write-Host "OK: combo '$combo' correctly ships no premium-console-assets"
          }

      - name: Extract NSIS installer (7-Zip) and verify staged files are present
        # 4R/RELIABILITY fix 2026-07-16 (major #5): this used to be a
        # Write-Warning that never failed the job - a real regression in
        # the NSIS payload (as opposed to the MSI's) would have shipped
        # silently green. 7-Zip extracts NSIS payloads fine in practice
        # (confirmed on this runner image), so there is no real reason left
        # to only warn here - now blocking, same as the MSI check above.
        shell: pwsh
        run: |
          $nsis = Get-ChildItem "shell\src-tauri\target\release\bundle\nsis\*.exe" | Select-Object -First 1
          if (-not $nsis) { Write-Error "no NSIS .exe produced"; exit 1 }
          $extractDir = "$PWD\nsis-extracted"
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          & "C:\Program Files\7-Zip\7z.exe" x "$($nsis.FullName)" "-o$extractDir" -y
          Write-Host "== NSIS extracted tree =="
          Get-ChildItem -Recurse "$extractDir"
          $hits = Get-ChildItem -Path $extractDir -Recurse -File -ErrorAction SilentlyContinue | Select-String -Pattern "FAKE-FIXTURE-CENTINELO" -ErrorAction SilentlyContinue
          if (-not $hits) {
            Write-Error "no FAKE-FIXTURE-CENTINELO marker strings found anywhere in the extracted NSIS payload - bundle.resources did not make it into the NSIS installer"
            exit 1
          }
          Write-Host "== Marker strings found in NSIS installer =="
          $hits | ForEach-Object { Write-Host $_.Path }

      - name: Verify installer bundle before upload
        # Same rigor as official-pro-build's own pre-upload check (blocker
        # #3): both files must exist and be non-empty, or nothing gets
        # uploaded.
        shell: pwsh
        run: |
          $nsis = Get-ChildItem "shell\src-tauri\target\release\bundle\nsis\*.exe" -ErrorAction SilentlyContinue
          $msi = Get-ChildItem "shell\src-tauri\target\release\bundle\msi\*.msi" -ErrorAction SilentlyContinue
          if (-not $nsis) { Write-Error "no .exe under bundle/nsis/ - refusing to upload"; exit 1 }
          if (-not $msi) { Write-Error "no .msi under bundle/msi/ - refusing to upload"; exit 1 }
          foreach ($f in @($nsis) + @($msi)) {
            if ($f.Length -eq 0) { Write-Error "$($f.FullName) exists but is zero bytes"; exit 1 }
          }
          Write-Host "OK: NSIS + MSI both present and non-empty"

      - name: Upload installer artifacts (synthetic fixtures only, nothing secret)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-smoke-test-${{ matrix.combo }}
          path: |
            shell/src-tauri/target/release/bundle/nsis/*
            shell/src-tauri/target/release/bundle/msi/*
          if-no-files-found: error

  # ---------------------------------------------------------------------
  # RETIRED 2026-07-16 (release-ci pass). This job used to be the real
  # official Pro build (core + shell + signed premium dylib, gated behind
  # workflow_dispatch's build_official_pro + i_understand_public_artifact_
  # risk inputs). It never ran for real (blockers #1-3 below its old
  # comment: no core-win yet at the time, no PREMIUM_REPO_PAT secret, no
  # agreed convention for fetching a signed dylib) - and blocker #4 was the
  # reason it's gone now, not just gated: its own "Upload official
  # installer" step uploaded the real signed installer via
  # actions/upload-artifact, and Actions artifacts on a PUBLIC repo are
  # downloadable by any GitHub user for the retention window, no ACL
  # beyond "public repo -> public artifact." A manual dispatch guard
  # mitigates that but doesn't fix it at the root - the fix is not
  # building the real official installer on this repo's Actions at all.
  #
  # Official Windows builds now happen entirely on the PRIVATE premium
  # repo's own Actions instead, where artifacts are collaborator-only:
  # see fegone/centinelo-premium's
  # .github/workflows/official-windows-build.yml. That workflow checks
  # THIS repo out (public, no secret needed for that direction) rather
  # than the other way around, so no PREMIUM_REPO_PAT is needed here
  # either - blocker #2 above is moot now, not just closed.
  #
  # This stub is intentionally still gate-able the same way the old job
  # was (workflow_dispatch + build_official_pro=true) so a dispatch built
  # against an old saved form (or muscle memory) fails with a clear
  # pointer instead of the job just silently no longer existing.
  official-pro-build:
    name: Official Pro build (RETIRED — moved to centinelo-premium)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_official_pro == true }}
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - name: Fail with pointer to the new location
        shell: pwsh
        run: |
          Write-Host "::error::Official builds moved to the private repo (centinelo-premium/official-windows-build.yml). This job is retired — see this workflow file's header comment above 'official-pro-build:' for why (public-repo Actions artifacts are world-downloadable, no approved publication path existed). Dispatch fegone/centinelo-premium's official-windows-build.yml workflow_dispatch instead."
          exit 1
