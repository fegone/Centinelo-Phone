name: windows installer (F5 packaging)

# Builds the actual Windows installer (.msi via WiX + .exe via NSIS) for
# Centinelo Phone, using shell/src-tauri/tauri.official.conf.json's
# `bundle.resources` override to pull in the core engine binary, the
# signed premium dylib+.sig, and the premium console-ui assets that
# scripts/package-official.sh stages into shell/dist-injected/ (see that
# script's header comment, "Windows target", for why this two-step
# stage-then-bundle shape exists — NSIS/MSI package a manifest, not
# whatever's sitting in target/release/ afterward, unlike macOS's .app).
#
# workflow_dispatch is the intended long-term trigger for the gated
# official-pro-build job (manual, on purpose - it's expensive and needs a
# secret that doesn't exist yet, see that job's comments) - but GitHub only
# allows dispatching a workflow that already exists on the repo's DEFAULT
# branch, which for this repo is `main` (v1, permanently off-limits per
# CLAUDE.md's hard rules; v2 hasn't been promoted to default yet). So
# workflow_dispatch here is NOT currently invokable via CLI/API/UI - it's
# left in place for when v2 (or wherever this file ends up) eventually
# becomes the default branch. For now, verification happens via the `push`
# trigger below (same pattern core-build.yml/shell-build.yml already use
# for v2/v2-shell), scoped to this feature branch for its initial
# smoke-test run - whoever integrates this into v2 should retarget these
# `branches:` entries the same way shell-build.yml targets `v2-shell`.
on:
  push:
    branches: [feature/windows-installer]
    paths:
      - 'shell/src-tauri/tauri.conf.json'
      - 'shell/src-tauri/tauri.official.conf.json'
      - 'scripts/package-official.sh'
      - '.github/workflows/windows-installer.yml'
  workflow_dispatch:
    inputs:
      build_official_pro:
        description: >-
          Also run the official Pro build job (needs core-win merged +
          PREMIUM_REPO_PAT secret + a real signed dylib - see that job's
          comments. Leave false to only run the resources-mechanism smoke
          test, which needs none of that.)
        type: boolean
        default: false

jobs:
  # ---------------------------------------------------------------------
  # Always runs on dispatch. Proves the NSIS/MSI + `bundle.resources`
  # mechanism itself works — that a real installer is produced and that
  # it actually contains files staged into shell/dist-injected/ at the
  # expected install-time locations — using synthetic, clearly-fake
  # fixtures. Needs NEITHER core-win NOR the private premium repo NOR any
  # secret: it is a test of this repo's own Tauri config, nothing else.
  # ---------------------------------------------------------------------
  resources-mechanism-smoke-test:
    name: NSIS/MSI resources mechanism (synthetic fixtures)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: shell
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install JS dependencies (Tauri CLI + API)
        run: npm ci

      - name: Rust toolchain
        run: rustup show

      - name: Stage synthetic (non-secret) premium + core-engine fixtures
        # Clearly-fake content, same shape package-official.sh's steps 6-8
        # produce for real - marker strings below are grepped for after
        # bundling, as proof the files really rode into the installer
        # rather than this job just trusting a green exit code.
        shell: pwsh
        run: |
          $dest = "dist-injected"
          New-Item -ItemType Directory -Force -Path "$dest\core-engine" | Out-Null
          New-Item -ItemType Directory -Force -Path "$dest\premium-console-assets\bridge" | Out-Null
          New-Item -ItemType Directory -Force -Path "$dest\premium-console-assets\components" | Out-Null
          New-Item -ItemType Directory -Force -Path "$dest\premium-console-assets\store" | Out-Null
          "FAKE-FIXTURE-CENTINELO-BARESIP-MARKER" | Out-File -Encoding ascii "$dest\core-engine\baresip.exe"
          # OpenSSL runtime DLL fixtures (blocker #1 fix, 2026-07-16): proves
          # package-official.sh's --openssl-dll-dir mechanism (files copied
          # flat into core-engine/ beside baresip.exe, see that script's "6b.
          # Copy OpenSSL runtime DLLs" step) actually survives into the real
          # NSIS/MSI installer via the SAME `core-engine/*` bundle.resources
          # glob baresip.exe itself rides in on - not a separate code path
          # that could silently diverge. Names match what a real Chocolatey
          # openssl v4.x install (current, OpenSSL 3.x) produces; the actual
          # script copies whatever *.dll is present, not these specific
          # names.
          "FAKE-FIXTURE-CENTINELO-LIBSSL-MARKER" | Out-File -Encoding ascii "$dest\core-engine\libssl-3-x64.dll"
          "FAKE-FIXTURE-CENTINELO-LIBCRYPTO-MARKER" | Out-File -Encoding ascii "$dest\core-engine\libcrypto-3-x64.dll"
          "FAKE-FIXTURE-CENTINELO-DYLIB-MARKER" | Out-File -Encoding ascii "$dest\centinelo_premium.dll"
          "FAKE-FIXTURE-CENTINELO-SIG-MARKER" | Out-File -Encoding ascii "$dest\centinelo_premium.dll.sig"
          "FAKE-FIXTURE-CENTINELO-CONSOLEAPP-MARKER" | Out-File -Encoding ascii "$dest\premium-console-assets\console-app.js"
          "FAKE-FIXTURE-CENTINELO-BRIDGE-MARKER" | Out-File -Encoding ascii "$dest\premium-console-assets\bridge\EngineBridge.js"
          "FAKE-FIXTURE-CENTINELO-COMPONENT-MARKER" | Out-File -Encoding ascii "$dest\premium-console-assets\components\extension-grid.js"
          "FAKE-FIXTURE-CENTINELO-STORE-MARKER" | Out-File -Encoding ascii "$dest\premium-console-assets\store\ConsoleStore.js"
          Get-ChildItem -Recurse "$dest"

      - name: Build the Windows installer (tauri build --config tauri.official.conf.json, nsis+msi)
        run: npx tauri build --config src-tauri/tauri.official.conf.json --bundles nsis,msi

      - name: List produced installer artifacts
        shell: pwsh
        run: |
          Get-ChildItem -Recurse "src-tauri\target\release\bundle\nsis"
          Get-ChildItem -Recurse "src-tauri\target\release\bundle\msi"

      - name: Extract MSI (admin install, no actual install) and verify staged files are present
        shell: pwsh
        run: |
          $msi = Get-ChildItem "src-tauri\target\release\bundle\msi\*.msi" | Select-Object -First 1
          if (-not $msi) { Write-Error "no .msi produced"; exit 1 }
          $extractDir = "$PWD\msi-extracted"
          msiexec /a "$($msi.FullName)" /qn TARGETDIR="$extractDir"
          Start-Sleep -Seconds 5
          Write-Host "== MSI extracted tree =="
          Get-ChildItem -Recurse "$extractDir"
          # Select-String has no -Recurse parameter of its own (that's a
          # Get-ChildItem thing) - piping a recursive file listing into it
          # is the correct shape. First attempt (this comment added after a
          # real run failed here with "A parameter cannot be found that
          # matches parameter name 'Recurse'" - a bug in this verification
          # script, not in the installer it was checking; the extracted
          # tree logged just above already showed the files in the right
          # place before this line even ran).
          $hits = Get-ChildItem -Path $extractDir -Recurse -File -ErrorAction SilentlyContinue | Select-String -Pattern "FAKE-FIXTURE-CENTINELO" -ErrorAction SilentlyContinue
          if (-not $hits) {
            Write-Error "none of the FAKE-FIXTURE-CENTINELO marker strings were found anywhere in the extracted MSI - bundle.resources did not make it into the installer"
            exit 1
          }
          Write-Host "== Marker strings found in MSI (proof resources rode along) =="
          $hits | ForEach-Object { Write-Host $_.Path }
          # Confirm centinelo_premium.dll landed in the SAME directory as
          # the main exe (not a Resources/ subfolder) - this is the load-
          # bearing assumption premium.rs's expected_library_path makes.
          $exe = Get-ChildItem -Recurse "$extractDir" -Filter "centinelo-shell.exe" | Select-Object -First 1
          $dll = Get-ChildItem -Recurse "$extractDir" -Filter "centinelo_premium.dll" | Select-Object -First 1
          if (-not $exe -or -not $dll) { Write-Error "exe or dll not found in extracted MSI"; exit 1 }
          if ($exe.DirectoryName -ne $dll.DirectoryName) {
            Write-Error "centinelo_premium.dll is NOT beside centinelo-shell.exe: exe in $($exe.DirectoryName), dll in $($dll.DirectoryName)"
            exit 1
          }
          Write-Host "OK: centinelo_premium.dll is beside centinelo-shell.exe at $($exe.DirectoryName)"
          # Blocker #1 fix verification: the OpenSSL runtime DLL fixtures
          # must land in the SAME directory as baresip.exe (core-engine/),
          # not just anywhere in the installer - that is the actual runtime
          # requirement (Windows DLL search order checks the launching
          # exe's own directory first), and is exactly the failure mode that
          # blocked Edgar's Windows beta (core.exe silently failing to start
          # with no OpenSSL DLLs on PATH).
          $baresipExe = Get-ChildItem -Recurse "$extractDir" -Filter "baresip.exe" | Select-Object -First 1
          if (-not $baresipExe) { Write-Error "baresip.exe (core-engine fixture) not found in extracted MSI"; exit 1 }
          $libssl = Get-ChildItem -Recurse "$extractDir" -Filter "libssl-3-x64.dll" | Select-Object -First 1
          $libcrypto = Get-ChildItem -Recurse "$extractDir" -Filter "libcrypto-3-x64.dll" | Select-Object -First 1
          if (-not $libssl -or -not $libcrypto) {
            Write-Error "OpenSSL runtime DLL fixtures (libssl-3-x64.dll / libcrypto-3-x64.dll) not found in extracted MSI - core.exe would fail to start on a clean machine"
            exit 1
          }
          if ($baresipExe.DirectoryName -ne $libssl.DirectoryName -or $baresipExe.DirectoryName -ne $libcrypto.DirectoryName) {
            Write-Error "OpenSSL DLLs are NOT beside baresip.exe: baresip.exe in $($baresipExe.DirectoryName), libssl in $($libssl.DirectoryName), libcrypto in $($libcrypto.DirectoryName)"
            exit 1
          }
          Write-Host "OK: OpenSSL runtime DLLs (libssl-3-x64.dll, libcrypto-3-x64.dll) are beside baresip.exe at $($baresipExe.DirectoryName)"

      - name: Extract NSIS installer (7-Zip) and verify staged files are present
        shell: pwsh
        run: |
          $nsis = Get-ChildItem "src-tauri\target\release\bundle\nsis\*.exe" | Select-Object -First 1
          if (-not $nsis) { Write-Error "no NSIS .exe produced"; exit 1 }
          $extractDir = "$PWD\nsis-extracted"
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          & "C:\Program Files\7-Zip\7z.exe" x "$($nsis.FullName)" "-o$extractDir" -y
          Write-Host "== NSIS extracted tree =="
          Get-ChildItem -Recurse "$extractDir"
          $hits = Get-ChildItem -Path $extractDir -Recurse -File -ErrorAction SilentlyContinue | Select-String -Pattern "FAKE-FIXTURE-CENTINELO" -ErrorAction SilentlyContinue
          if (-not $hits) {
            Write-Warning "7z could not find marker strings in the NSIS payload (some NSIS installers resist generic 7z extraction) - the MSI check above is the authoritative proof for this run; not failing the job on this alone."
          } else {
            Write-Host "== Marker strings found in NSIS installer =="
            $hits | ForEach-Object { Write-Host $_.Path }
          }

      - name: Upload installer artifacts (synthetic fixtures only, nothing secret)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-smoke-test
          path: |
            shell/src-tauri/target/release/bundle/nsis/*
            shell/src-tauri/target/release/bundle/msi/*
          if-no-files-found: warn

  # ---------------------------------------------------------------------
  # The real official Pro build. DELIBERATELY GATED OFF (only runs when
  # dispatched with build_official_pro=true) and UNTESTED this pass - see
  # .claude/reports/release-ci-2026-07-16-windows-installer.md for exactly
  # why. Two blockers remain, both outside release-ci's scope to resolve
  # alone (a third - core-win - closed 2026-07-16, see below):
  #
  #   1. [CLOSED 2026-07-16] core-win (feature/windows-media-modules,
  #      ausine/aufile/ice/dtls_srtp/wasapi) merged to v2 at 47df112 -
  #      the "Build core/ (Windows)" steps below now mirror the CURRENT
  #      core-build.yml Windows job (including the wasapi module and the
  #      fuller MODULES list), pulled in via merging origin/v2 into this
  #      branch. Still never run as part of *this* workflow though - only
  #      core-build.yml's own job has actually exercised these exact
  #      commands on a real runner.
  #   2. PREMIUM_REPO_PAT does not exist as a repo secret yet. Needs a
  #      fine-grained PAT (or deploy key) scoped to READ-ONLY on
  #      fegone/centinelo-premium, created by Felix, added under this
  #      repo's Settings > Secrets > Actions. NEVER logged, NEVER echoed -
  #      actions/checkout's `token` input passes it straight to git's
  #      credential helper without printing it.
  #   3. No agreed convention yet for WHERE in the private premium repo a
  #      real, offline-signed dylib+.sig lives for CI to fetch. Proposed
  #      here (not yet built or agreed with Felix/licensing):
  #      Felix runs premium/scripts/build-and-sign-premium.sh locally
  #      (offline, has the real centinelo_libsign.key - see
  #      premium/docs/PACKAGING-SIGNATURES.md), then commits the output
  #      pair to a fixed path in the premium repo, e.g.
  #      premium/dist-signed/windows/centinelo_premium.dll(.sig), and
  #      pushes. This job then just reads that path from its private-repo
  #      checkout - no signing, no key material, ever touches this
  #      workflow or any GitHub Actions runner.
  official-pro-build:
    name: Official Pro build (core + shell + signed premium)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_official_pro == true }}
    runs-on: windows-latest
    steps:
      - name: Checkout phone (public, this ref)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout premium (private) — signed dylib + console-ui source
        # Read-only checkout. Never writes back to this repo, never logs
        # secret contents (checkout's token handling keeps it out of the
        # step's stdout). See blocker #2/#3 in the comment above this job.
        uses: actions/checkout@v4
        with:
          repository: fegone/centinelo-premium
          token: ${{ secrets.PREMIUM_REPO_PAT }}
          path: premium-checkout

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install OpenSSL (Chocolatey)
        # Mirrors core-build.yml's Windows job exactly (same choco package,
        # same path-detection dance) — kept as a literal copy rather than a
        # shared composite action for this first pass; see Known gap #6 in
        # scripts/package-official.sh about the same series-of-patches
        # duplication problem applying here too.
        run: choco install openssl -y --no-progress

      - name: Locate OpenSSL install dir (choco deploy path varies by pkg version)
        shell: pwsh
        run: |
          $candidates = @('C:\Program Files\OpenSSL', 'C:\Program Files\OpenSSL-Win64')
          $root = $candidates | Where-Object { Test-Path "$_\include\openssl\ssl.h" } | Select-Object -First 1
          if (-not $root) {
            Write-Error "OpenSSL headers not found under: $($candidates -join ', ')"
            exit 1
          }
          "OPENSSL_ROOT_DIR=$root" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Apply local re/baresip patches
        shell: bash
        run: |
          git apply --directory=core/deps/re core/patches/0001-re-configurable-sip-ws-path.patch
          git apply --directory=core/deps/re core/patches/0002-re-tls-fingerprint-pin.patch
          git apply --directory=core/deps/re core/patches/0004-re-json-stdout-purity.patch
          git apply --directory=core/deps/baresip core/patches/0003-baresip-json-stdout-purity.patch

      - name: Configure + build + install libre (static)
        shell: bash
        run: |
          set -o pipefail
          RE_INSTALL="$(pwd -W)/re-install-prefix"
          cmake -S core/deps/re -B core/deps/re/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$RE_INSTALL" \
            -DLIBRE_BUILD_SHARED=OFF \
            -DLIBRE_BUILD_STATIC=ON \
            -DOPENSSL_ROOT_DIR="$OPENSSL_ROOT_DIR"
          cmake --build core/deps/re/build --config Release
          cmake --install core/deps/re/build --config Release

      - name: Configure + build baresip + ctrl_json
        # MODULES list kept identical to core-build.yml's own Windows job
        # (as of 47df112, the windows-media-modules merge) - THIS IS A
        # THIRD copy of that list (core-build.yml, package-official.sh's
        # macOS branch, and here), same DRY problem package-official.sh's
        # "Known gaps" already flags for the patch list; no shared source
        # today, drift is manual-sync-only.
        shell: bash
        run: |
          set -o pipefail
          RE_INSTALL="$(pwd -W)/re-install-prefix"
          cmake -S core/deps/baresip -B core/deps/baresip/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DRE_LIBRARY="$RE_INSTALL/lib/re-static.lib" \
            -DRE_INCLUDE_DIR="$(pwd -W)/core/deps/re/include" \
            -DOPENSSL_ROOT_DIR="$OPENSSL_ROOT_DIR" \
            -DMODULES="account;g711;auconv;auresamp;ausine;aufile;ice;dtls_srtp;menu;wasapi" \
            -DAPP_MODULES="ctrl_json" \
            -DAPP_MODULES_DIR="$(pwd -W)/core/modules"
          cmake --build core/deps/baresip/build --config Release

      - name: Stage artifacts + build the installer (package-official.sh)
        # --openssl-dll-dir (blocker #1 fix, 2026-07-16): $OPENSSL_ROOT_DIR
        # was resolved by the "Locate OpenSSL install dir" step above (same
        # env var core-build.yml's own Windows job resolves and uses) - its
        # `bin\` subdir is where the Chocolatey openssl package deploys the
        # runtime DLLs baresip.exe needs beside itself (see
        # package-official.sh's "2b. Validate OpenSSL DLL dir" / "6b. Copy
        # OpenSSL runtime DLLs" for the full rationale). Without this flag
        # the script now hard-fails for --target windows rather than
        # silently producing a broken installer.
        shell: bash
        run: |
          bash scripts/package-official.sh --target windows \
            --skip-core-build \
            --openssl-dll-dir "$OPENSSL_ROOT_DIR/bin" \
            --premium-dylib premium-checkout/dist-signed/windows/centinelo_premium.dll \
            --premium-sig premium-checkout/dist-signed/windows/centinelo_premium.dll.sig \
            --premium-console-assets premium-checkout/console-ui/src \
            --output-dir dist/windows

      - name: Verify OpenSSL runtime DLLs staged beside baresip.exe
        # Fails fast, before spending time on `tauri build`, if the DLL
        # copy silently produced nothing (e.g. an OpenSSL install with a
        # bin/ dir that has headers but no runtime DLLs - shouldn't happen
        # with choco's package, but this is the exact failure class that
        # caused blocker #1 in the first place, so it gets its own explicit
        # check rather than trusting the script's internal validation
        # alone).
        shell: pwsh
        run: |
          $dlls = Get-ChildItem "shell\dist-injected\core-engine\*.dll" -ErrorAction SilentlyContinue
          if (-not $dlls) {
            Write-Error "no *.dll files staged in shell/dist-injected/core-engine/ - baresip.exe would not start"
            exit 1
          }
          Write-Host "== OpenSSL runtime DLLs staged =="
          $dlls | ForEach-Object { Write-Host $_.Name }

      - name: Upload official installer
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: centinelo-phone-windows-installer-official
          path: |
            shell/src-tauri/target/release/bundle/nsis/*
            shell/src-tauri/target/release/bundle/msi/*
          if-no-files-found: warn
