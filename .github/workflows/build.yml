name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# electron-builder publishes installers to GitHub Releases on v* tags —
# the default GITHUB_TOKEN is read-only without this.
permissions:
  contents: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm test

  build-win:
    needs: smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      # Tag push (v*) → publish installer to a GitHub Release (auto-update feed).
      # Branch push → build only, upload as workflow artifact.
      - name: Build NSIS installer
        run: npx electron-builder --win --x64 ${{ startsWith(github.ref, 'refs/tags/v') && '--publish always' || '--publish never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        with:
          name: CentineloPhone-win-x64
          path: dist/*.exe
          if-no-files-found: error

  build-mac:
    needs: smoke
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Build DMG
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
